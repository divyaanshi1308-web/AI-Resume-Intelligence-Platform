<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Intelligence</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAF7F2;
      --white: #FFFFFF;
      --yellow: #E8C76A;
      --yellow-light: #FDF3D0;
      --pink: #F7E7EA;
      --pink-mid: #EDAABB;
      --lavender: #EFE8F8;
      --lavender-mid: #C9B8EF;
      --sage: #E4EDE8;
      --text: #1F2937;
      --text-secondary: #6B7280;
      --text-light: #9CA3AF;
      --border: rgba(31,41,55,0.08);
      --shadow-sm: 0 2px 8px rgba(31,41,55,0.06);
      --shadow-md: 0 8px 24px rgba(31,41,55,0.09);
      --shadow-lg: 0 20px 48px rgba(31,41,55,0.12);
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 28px;
      --radius-xl: 36px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* NAVBAR */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 14px 0;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(250,247,242,0.85);
      border-bottom: 1px solid rgba(31,41,55,0.06);
      transition: all 0.3s ease;
    }
    .navbar.scrolled {
      background: rgba(250,247,242,0.95);
      box-shadow: var(--shadow-sm);
    }
    .nav-inner {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Fraunces', serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .nav-logo-mark {
      width: 32px; height: 32px;
      background: var(--yellow);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .nav-links {
      display: flex; align-items: center; gap: 4px;
      list-style: none;
    }
    .nav-links a {
      padding: 7px 14px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      border-radius: 10px;
      transition: all 0.2s;
    }
    .nav-links a:hover { color: var(--text); background: var(--pink); }
    .nav-cta {
      background: var(--text);
      color: var(--white) !important;
      padding: 9px 20px !important;
      border-radius: 12px !important;
      font-weight: 600 !important;
      transition: all 0.2s !important;
    }
    .nav-cta:hover { background: #374151 !important; transform: translateY(-1px); box-shadow: var(--shadow-md) !important; }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 120px 24px 80px;
      position: relative;
      overflow: hidden;
      text-align: center;
    }
    .hero-blobs {
      position: absolute; inset: 0; pointer-events: none; z-index: 0;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.55;
      animation: blobFloat 12s ease-in-out infinite;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--yellow-light); top: -100px; left: -150px; animation-delay: 0s; }
    .blob-2 { width: 400px; height: 400px; background: var(--pink); top: 60%; right: -120px; animation-delay: -4s; }
    .blob-3 { width: 300px; height: 300px; background: var(--lavender); bottom: 5%; left: 30%; animation-delay: -8s; }

    @keyframes blobFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -25px) scale(1.04); }
      66% { transform: translate(-15px, 15px) scale(0.97); }
    }

    .hero-content { position: relative; z-index: 1; max-width: 720px; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 7px 18px 7px 10px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 28px;
      box-shadow: var(--shadow-sm);
      animation: fadeUp 0.6s ease both;
    }
    .badge-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--yellow); display: inline-block; }
    .hero-h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2.6rem, 6vw, 4.2rem);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 22px;
      animation: fadeUp 0.6s 0.1s ease both;
    }
    .hero-h1 em { font-style: italic; color: #A47C2A; }
    .hero-sub {
      font-size: 1.1rem;
      color: var(--text-secondary);
      line-height: 1.65;
      max-width: 520px;
      margin: 0 auto 36px;
      animation: fadeUp 0.6s 0.2s ease both;
      font-weight: 400;
    }
    .hero-actions {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
      animation: fadeUp 0.6s 0.3s ease both;
    }
    .btn-primary {
      background: var(--text);
      color: var(--white);
      border: none;
      padding: 14px 28px;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      font-family: 'Inter', sans-serif;
    }
    .btn-primary:hover { background: #374151; transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .btn-secondary {
      background: var(--white);
      color: var(--text);
      border: 1.5px solid var(--border);
      padding: 13px 26px;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
      font-family: 'Inter', sans-serif;
    }
    .btn-secondary:hover { border-color: var(--yellow); background: var(--yellow-light); transform: translateY(-2px); }

    /* RESUME ILLUSTRATION */
    .hero-illustration {
      margin: 56px auto 0;
      max-width: 680px;
      animation: fadeUp 0.7s 0.4s ease both;
    }
    .resume-card-mock {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .resume-card-header {
      background: linear-gradient(135deg, var(--yellow-light), var(--pink));
      padding: 24px 28px;
      display: flex; align-items: center; gap: 16px;
    }
    .resume-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--white);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif;
      font-size: 1.4rem; font-weight: 600; color: var(--text);
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
    }
    .resume-name { font-weight: 600; font-size: 1.05rem; }
    .resume-title { font-size: 0.83rem; color: var(--text-secondary); margin-top: 2px; }
    .resume-body { padding: 20px 28px; display: flex; gap: 24px; }
    .resume-col { flex: 1; }
    .resume-section-label {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em;
      color: var(--text-light); text-transform: uppercase; margin-bottom: 10px;
    }
    .resume-line {
      height: 8px; background: var(--bg); border-radius: 4px; margin-bottom: 6px;
    }
    .resume-line.w90 { width: 90%; }
    .resume-line.w70 { width: 70%; }
    .resume-line.w80 { width: 80%; }
    .resume-line.w50 { width: 50%; }
    .resume-chip {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 0.72rem;
      font-weight: 500;
      margin: 3px;
    }
    .chip-yellow { background: var(--yellow-light); color: #7A5C0A; }
    .chip-pink { background: var(--pink); color: #8B3952; }
    .chip-lavender { background: var(--lavender); color: #5B3F96; }
    .chip-sage { background: var(--sage); color: #2D5A3D; }

    /* ATS SCORE BAR IN MOCK */
    .ats-mini {
      padding: 12px 28px 20px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
    }
    .ats-mini-label { font-size: 0.8rem; color: var(--text-secondary); font-weight: 500; white-space: nowrap; }
    .ats-bar-track { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .ats-bar-fill {
      height: 100%; background: linear-gradient(90deg, var(--yellow), #D4A84B);
      border-radius: 4px;
      animation: growBar 1.8s 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
      width: 78%;
    }
    @keyframes growBar { from { width: 0; } }
    .ats-score-num { font-size: 0.9rem; font-weight: 700; color: var(--text); }

    /* SECTION COMMONS */
    .section { padding: 100px 24px; }
    .section-inner { max-width: 1160px; margin: 0 auto; }
    .section-eyebrow {
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-light);
      margin-bottom: 14px;
    }
    .section-title {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.9rem, 4vw, 2.8rem);
      font-weight: 600; line-height: 1.15;
      letter-spacing: -0.025em;
      color: var(--text);
      margin-bottom: 16px;
    }
    .section-desc {
      font-size: 1.05rem; color: var(--text-secondary); line-height: 1.65;
      max-width: 480px;
    }

    /* FEATURES */
    .features { background: var(--white); }
    .features-header { text-align: center; margin-bottom: 60px; }
    .features-header .section-desc { margin: 0 auto; }
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }
    .feature-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 28px 24px;
      transition: all 0.3s cubic-bezier(0.34,1.3,0.64,1);
      cursor: default;
    }
    .feature-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: transparent;
    }
    .feature-icon {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin-bottom: 18px;
    }
    .feature-title { font-weight: 600; font-size: 1rem; margin-bottom: 8px; }
    .feature-desc { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.6; }

    /* UPLOAD SECTION */
    .upload-section { background: var(--bg); }
    .upload-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
    .upload-zone {
      background: var(--white);
      border: 2px dashed #D1C9BA;
      border-radius: var(--radius-xl);
      padding: 52px 36px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .upload-zone:hover, .upload-zone.dragging {
      border-color: var(--yellow);
      background: var(--yellow-light);
    }
    .upload-zone.success { border-color: #6ECA9B; background: #F0FAF5; border-style: solid; }
    .upload-zone.loading { border-style: solid; border-color: var(--lavender-mid); background: var(--lavender); }
    .upload-icon {
      width: 64px; height: 64px; margin: 0 auto 20px;
      background: var(--yellow-light);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      transition: all 0.3s;
    }
    .upload-zone:hover .upload-icon { transform: scale(1.08); }
    .upload-zone.success .upload-icon { background: #D4F5E5; }
    .upload-title { font-weight: 600; font-size: 1.05rem; margin-bottom: 8px; }
    .upload-sub { font-size: 0.87rem; color: var(--text-secondary); margin-bottom: 24px; }
    .upload-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--text); color: var(--white);
      padding: 11px 22px; border-radius: 12px;
      font-size: 0.9rem; font-weight: 600;
      border: none; cursor: pointer;
      transition: all 0.25s;
      font-family: 'Inter', sans-serif;
    }
    .upload-btn:hover { background: #374151; transform: translateY(-1px); }
    .upload-btn.success-btn { background: #2D9B67; }
    .upload-size-note { font-size: 0.78rem; color: var(--text-light); margin-top: 14px; }

    /* SPINNER */
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--lavender);
      border-top-color: var(--lavender-mid);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ATS DASHBOARD */
    .dashboard-section { background: var(--white); }
    .dashboard-grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
      margin-top: 48px;
    }
    .dash-left { display: flex; flex-direction: column; gap: 20px; }
    .dash-right { display: flex; flex-direction: column; gap: 20px; }
    .dash-card {
      background: var(--bg);
      border-radius: var(--radius-md);
      padding: 24px;
      border: 1px solid var(--border);
    }
    .dash-card-title { font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }

    /* SCORE CIRCLE */
    .score-circle-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 0 16px; }
    .score-ring { position: relative; width: 130px; height: 130px; }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring circle.track { fill: none; stroke: var(--yellow-light); stroke-width: 10; }
    .score-ring circle.fill {
      fill: none; stroke: var(--yellow); stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 339.3;
      stroke-dashoffset: 339.3;
      transition: stroke-dashoffset 1.5s cubic-bezier(0.34,1.1,0.64,1);
    }
    .score-ring circle.fill.animated { stroke-dashoffset: 74.6; }
    .score-label {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .score-num { font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 600; color: var(--text); line-height: 1; }
    .score-unit { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }
    .score-tag {
      background: var(--yellow-light); color: #7A5C0A;
      padding: 4px 14px; border-radius: 100px;
      font-size: 0.78rem; font-weight: 600;
    }

    /* SKILLS GRID */
    .skills-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .skill-chip {
      padding: 6px 14px; border-radius: 100px;
      font-size: 0.82rem; font-weight: 500;
      display: flex; align-items: center; gap: 5px;
    }
    .skill-found { background: var(--yellow-light); color: #6D5209; }
    .skill-missing { background: var(--pink); color: #8B3952; }
    .skill-dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot-found { background: #D4A84B; }
    .dot-missing { background: var(--pink-mid); }

    /* SUGGESTIONS */
    .suggestion-item {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .suggestion-item:last-child { border-bottom: none; padding-bottom: 0; }
    .suggestion-icon {
      width: 32px; height: 32px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; flex-shrink: 0; margin-top: 1px;
    }
    .suggestion-text { font-size: 0.88rem; color: var(--text); line-height: 1.55; }
    .suggestion-text strong { font-weight: 600; }

    /* JD MATCHER */
    .jd-section { background: var(--bg); }
    .jd-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 48px; }
    .jd-input-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 28px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .jd-label { font-size: 0.82rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px; letter-spacing: 0.04em; }
    .jd-textarea {
      width: 100%; min-height: 200px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.6;
      resize: vertical;
      transition: border-color 0.2s;
      outline: none;
    }
    .jd-textarea:focus { border-color: var(--yellow); }
    .jd-textarea::placeholder { color: var(--text-light); }
    .match-btn {
      width: 100%; margin-top: 16px;
      background: var(--text); color: var(--white);
      border: none; padding: 14px;
      border-radius: 13px; font-size: 0.95rem;
      font-weight: 600; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.25s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .match-btn:hover { background: #374151; transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .match-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* MATCH RESULTS */
    .match-results { display: flex; flex-direction: column; gap: 16px; }
    .match-score-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 24px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      display: flex; align-items: center; gap: 20px;
    }
    .match-pct-circle {
      width: 72px; height: 72px; flex-shrink: 0;
      border-radius: 50%;
      background: conic-gradient(var(--yellow) calc(var(--pct) * 3.6deg), var(--yellow-light) 0);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .match-pct-circle::after {
      content: attr(data-label);
      position: absolute; inset: 10px;
      background: var(--white);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.95rem; color: var(--text);
    }
    .match-info-title { font-weight: 600; margin-bottom: 4px; }
    .match-info-desc { font-size: 0.85rem; color: var(--text-secondary); }
    .match-detail-card {
      background: var(--white);
      border-radius: var(--radius-md);
      padding: 20px 24px;
      border: 1px solid var(--border);
    }
    .match-section-title {
      font-size: 0.82rem; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px;
    }

    /* FOOTER */
    footer {
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 40px 24px;
    }
    .footer-inner {
      max-width: 1160px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: gap;
      gap: 20px;
    }
    .footer-logo {
      font-family: 'Fraunces', serif;
      font-size: 1.05rem; font-weight: 600; color: var(--text);
    }
    .footer-links { display: flex; gap: 6px; }
    .footer-links a {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary); text-decoration: none;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .footer-links a:hover { background: var(--yellow-light); color: var(--text); transform: translateY(-2px); }
    .footer-copy { font-size: 0.82rem; color: var(--text-light); }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeUp 0.6s ease both; }
    .fade-in-delay-1 { animation: fadeUp 0.6s 0.1s ease both; }
    .fade-in-delay-2 { animation: fadeUp 0.6s 0.2s ease both; }

    /* STRENGTH BAR */
    .strength-row { margin-bottom: 14px; }
    .strength-label-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .strength-label { font-size: 0.85rem; font-weight: 500; }
    .strength-pct { font-size: 0.82rem; color: var(--text-secondary); font-weight: 600; }
    .strength-track { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .strength-bar { height: 100%; border-radius: 4px; transition: width 1.2s cubic-bezier(0.34,1.2,0.64,1); }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .upload-layout, .dashboard-grid, .jd-layout { grid-template-columns: 1fr; }
      .nav-links { display: none; }
      .resume-body { flex-direction: column; }

/* ---------- UPLOAD ---------- */
function UploadSection({ uploadState, setUploadState, fileName, setFileName }) {
  const [dragging, setDragging] = useState(false);
  const fileRef = useRef();

  const handleFile = (file) => {
    if (!file) return;
    setFileName(file.name);
    setUploadState('loading');
    setTimeout(() => setUploadState('success'), 2200);
  };

  return (
    <section className="section upload-section" id="upload">
      <div className="section-inner">
        <div className="upload-layout">
          <div className="reveal">
            <div className="section-eyebrow">Get started</div>
            <h2 className="section-title">Upload your resume</h2>
            <p className="section-desc" style={{marginBottom: 24}}>Drop your PDF resume and get a full analysis in under 30 seconds. No account required.</p>
            <div style={{display:'flex', flexDirection:'column', gap:10}}>
              {['PDF format supported', 'Instant ATS score', 'Private & secure — never stored'].map((t, i) => (
                <div key={i} style={{display:'flex', gap:10, alignItems:'center', fontSize:'0.88rem', color:'var(--text-secondary)'}}>
                  <span style={{width:20,height:20,borderRadius:6,background:'var(--yellow-light)',display:'flex',alignItems:'center',justifyContent:'center',color:'#B8930A',fontSize:'0.7rem',flexShrink:0}}><Icon name="check" size={12}/></span>
                  {t}
                </div>
              ))}
            </div>
          </div>
          <div className="reveal">
            <div
              className={`upload-zone${dragging ? ' dragging' : ''}${uploadState === 'success' ? ' success' : ''}${uploadState === 'loading' ? ' loading' : ''}`}
              onDragOver={e => { e.preventDefault(); setDragging(true); }}
              onDragLeave={() => setDragging(false)}
              onDrop={e => { e.preventDefault(); setDragging(false); handleFile(e.dataTransfer.files[0]); }}
              onClick={() => uploadState === 'idle' && fileRef.current.click()}
            >
              <input ref={fileRef} type="file" accept=".pdf" style={{display:'none'}} onChange={e => handleFile(e.target.files[0])} />

              {uploadState === 'idle' && <>
                <div className="upload-icon"><Icon name="file" size={28} style={{color:'#B8930A'}}/></div>
                <div className="upload-title">Drop your resume here</div>
                <div className="upload-sub">Drag and drop your PDF, or click to browse</div>
                <button className="upload-btn" onClick={e => { e.stopPropagation(); fileRef.current.click(); }}>
                  <Icon name="upload" size={16}/> Choose PDF
                </button>
                <div className="upload-size-note">PDF up to 10 MB</div>
              </>}

              {uploadState === 'loading' && <>
                <div className="spinner" />
                <div className="upload-title">Analyzing your resume…</div>
                <div className="upload-sub" style={{color:'var(--lavender-mid)'}}>Extracting skills · Scoring ATS · Detecting keywords</div>
              </>}

                  <Icon name="check" size={28} style={{color:'#2D9B67'}}/>
                </div>

                <div className="upload-sub">{fileName || 'resume.pdf'} · Ready to review</div>
                <button className="upload-btn success-btn">
                  <Icon name="arrow" size={16}/> View Results
                </button>
              </>}
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

                  <div className="match-section-title">✗ Skills to add</div>
                  <div className="skills-wrap">
                    {missing.map(s => <span className="skill-chip skill-missing" key={s}><span className="skill-dot dot-missing"/>{s}</span>)}
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}

/* ---------- SCROLL REVEAL ---------- */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
    }, { threshold: 0.1 });
    els.forEach(el => observer.observe(el));
    return () => observer.disconnect();
  }, []);
}

/* ---------- APP ---------- */
function App() {
  const [uploadState, setUploadState] = useState('idle');
  const [fileName, setFileName] = useState('');

  useReveal();

  const scrollToUpload = () => {
    document.getElementById('upload').scrollIntoView({ behavior: 'smooth' });
  };

  return (
    <div>
      <Navbar onUploadClick={scrollToUpload} />
      <Hero onUploadClick={scrollToUpload} />
      <Features />
      <UploadSection
        uploadState={uploadState}
        setUploadState={setUploadState}
        fileName={fileName}
        setFileName={setFileName}
      />
      <Dashboard visible={uploadState === 'success'} />
      <JDMatcher />
      <Footer />
    </div>
  );
}

export default App;
